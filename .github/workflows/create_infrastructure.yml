name: Create Infrastructure

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 364817831286.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: paddyrails/patient-profile
  APP_RUNNER_SERVICE_NAME: patient-profile-api

jobs:
  create-neon-database:
    runs-on: ubuntu-latest
    outputs:
      neon_project_id: ${{ steps.create-neon.outputs.project_id }}
      database_url: ${{ steps.create-neon.outputs.database_url }}

    steps:
      - name: Create Neon Project
        id: create-neon
        run: |
          RESPONSE=$(curl -s -X POST \                                                                                                       
            "https://console.neon.tech/api/v2/projects" \                                                                                  
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "project": {                                                                                                                   
                "name": "patient-profile-db",
                "region_id": "aws-us-east-1"                                                                                                 
              }                                                                                                                            
            }')                                                                                                                              

          PROJECT_ID=$(echo $RESPONSE | jq -r '.project.id')                                                                                 
          DATABASE_URL=$(echo $RESPONSE | jq -r '.connection_uris[0].connection_uri')                                                      
                                            
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "database_url=$DATABASE_URL" >> $GITHUB_OUTPUT
          echo "Neon project created with ID: $PROJECT_ID"

      - name: Save Neon Project ID as GitHub Variable
        run: |
          curl -s -X PUT \                  
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \                                                                         
            -H "Accept: application/vnd.github.v3+json" \                                                                                  
            "https://api.github.com/repos/${{ github.repository }}/actions/variables/NEON_PROJECT_ID" \                                      
            -d "{\"name\":\"NEON_PROJECT_ID\",\"value\":\"${{ steps.create-neon.outputs.project_id }}\"}"

  create-app-runner:
    runs-on: ubuntu-latest
    needs: create-neon-database

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create App Runner Service
        run: |
          aws apprunner create-service \
            --service-name ${{ env.APP_RUNNER_SERVICE_NAME }} \                                                                              
            --source-configuration "{                                                                                                      
              \"ImageRepository\": {    
                \"ImageIdentifier\": \"${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest\",
                \"ImageConfiguration\": {                                                                                                    
                  \"Port\": \"8000\",   
                  \"RuntimeEnvironmentVariables\": {                                                                                         
                    \"DATABASE_URL\": \"${{ needs.create-neon-database.outputs.database_url }}\"                                             
                  }                         
                },                                                                                                                           
                \"ImageRepositoryType\": \"ECR\"                                                                                           
              },                                                                                                                             
              \"AutoDeploymentsEnabled\": true,
              \"AuthenticationConfiguration\": {                                                                                             
                \"AccessRoleArn\": \"${{ secrets.APP_RUNNER_ECR_ROLE_ARN }}\"                                                              
              }                         
            }" \
            --instance-configuration "{                                                                                                      
              \"Cpu\": \"0.25 vCPU\",
              \"Memory\": \"0.5 GB\"                                                                                                         
            }" \                                                                                                                           
            --region ${{ env.AWS_REGION }}

      - name: Get App Runner Service URL
        run: |
          SERVICE_URL=$(aws apprunner describe-service \                                                                                   
            --service-name ${{ env.APP_RUNNER_SERVICE_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'Service.ServiceUrl' \                                                                                                   
            --output text)              
          echo "App Runner URL: https://$SERVICE_URL"                                                                                        
          echo "Swagger Docs: https://$SERVICE_URL/docs"
