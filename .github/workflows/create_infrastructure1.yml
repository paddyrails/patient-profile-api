name: Create Infrastructure

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 364817831286.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: paddyrails/patient-profile
  APP_RUNNER_SERVICE_NAME: patient-profile-api

jobs:
  create-app-runner:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create App Runner Service
        run: |
          aws apprunner create-service \
            --service-name ${{ env.APP_RUNNER_SERVICE_NAME }} \
            --source-configuration "{
              \"ImageRepository\": {
                \"ImageIdentifier\": \"${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest\",
                \"ImageConfiguration\": {
                  \"Port\": \"8000\",
                  \"RuntimeEnvironmentVariables\": {
                    \"DATABASE_URL\": \"${{ secrets.DATABASE_URL }}\"
                  }
                },
                \"ImageRepositoryType\": \"ECR\"
              },
              \"AutoDeploymentsEnabled\": true,
              \"AuthenticationConfiguration\": {
                \"AccessRoleArn\": \"${{ secrets.APP_RUNNER_ECR_ROLE_ARN }}\"
              }
            }" \
            --instance-configuration "{
              \"Cpu\": \"0.25 vCPU\",
              \"Memory\": \"0.5 GB\"
            }" \
            --region ${{ env.AWS_REGION }}

      - name: Get App Runner Service URL
        run: |
          SERVICE_URL=$(aws apprunner describe-service \
            --service-name ${{ env.APP_RUNNER_SERVICE_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'Service.ServiceUrl' \
            --output text)
          echo "App Runner URL: https://$SERVICE_URL"
          echo "Swagger Docs: https://$SERVICE_URL/docs"
